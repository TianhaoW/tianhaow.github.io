- $X$: a geometrically integral scheme of finite type over $\mathbb{Z}$ or $\mathbb{F}_q$. 
- $x_0\in |X|$: a closed point with finite residue field $\kappa(x_0)$. 
- $\overline{\eta}$: a geometric generic point of $X$. 
- $\overline{x}_0$: a geometric point above $x_0$, together with a choice of specialization $\overline{\eta}\leadsto \overline{x}_0$, which induces

$$ \operatorname{sp}_{x_0}: \operatorname{Gal}\bigl(\overline{\kappa(x_0)}/\kappa(x_0)\bigr) \longrightarrow \pi_1(X,\overline{\eta}). $$
